# Databricks Asset Bundle Configuration
# Claims Fraud Detection - machine_learning.casetracker

bundle:
  name: claims-fraud-detection

# include:
#   - resources/*.yml  # Optional: include resource definitions if they exist

# Variables for different environments
variables:
  catalog:
    description: Unity Catalog name
    default: machine_learning
  
  schema:
    description: Schema name
    default: casetracker

# Development target
targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://dbc-d4506e69-bbc8.cloud.databricks.com
    
    variables:
      catalog: machine_learning
      schema: casetracker
    
    resources:
      jobs:
        claims_fraud_training_job:
          name: "[DEV] Claims Fraud Training"
          
        claims_fraud_scoring_job:
          name: "[DEV] Claims Fraud Scoring"

  # Production target  
  prod:
    mode: production
    workspace:
      host: https://dbc-d4506e69-bbc8.cloud.databricks.com
      # Use production workspace path
      root_path: /Workspace/Production/claims_fraud
    
    variables:
      catalog: machine_learning
      schema: casetracker
    
    # Require explicit approval for production
    permissions:
      - level: CAN_MANAGE
        group_name: admins

# Sync configuration
sync:
  exclude:
    - .git
    - __pycache__
    - "*.pyc"
    - venv
    - backup_*

